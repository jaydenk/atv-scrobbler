name: Release

on:
  push:
    branches: [main]
    paths-ignore:
      - "README.md"
      - "CLAUDE.md"
      - "TODO.md"
      - ".gitignore"
      - "docs/**"

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3

      - uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ghcr.io/jaydenk/atv-scrobbler:latest
            ghcr.io/jaydenk/atv-scrobbler:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy to pimento
    needs: build
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Connect to Tailscale
        uses: tailscale/github-action@v4
        with:
          oauth-client-id: ${{ secrets.TS_OAUTH_CLIENT_ID }}
          oauth-secret: ${{ secrets.TS_OAUTH_SECRET }}
          tags: tag:ci

      - name: Deploy
        env:
          SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
          SSH_USER: ${{ secrets.DEPLOY_SSH_USER }}
          SSH_HOST: ${{ secrets.DEPLOY_SSH_HOST }}
        run: |
          eval "$(ssh-agent -s)"
          echo "$SSH_KEY" | ssh-add -
          mkdir -p ~/.ssh
          echo "StrictHostKeyChecking no" >> ~/.ssh/config

          ssh -o ConnectTimeout=30 "${SSH_USER}@${SSH_HOST}" bash -s <<'DEPLOY_SCRIPT'
          set -euo pipefail
          cd ~/services/atv-scrobbler

          echo "Pulling latest changes..."
          git pull --ff-only

          echo "Pulling new image..."
          docker compose pull

          echo "Recreating container..."
          docker compose up -d

          echo "Waiting for container to be healthy..."
          for i in $(seq 1 30); do
            STATUS=$(docker inspect --format='{{.State.Health.Status}}' atv-scrobbler 2>/dev/null || echo "unknown")
            if [ "$STATUS" = "healthy" ]; then
              echo "Container healthy!"
              docker compose ps
              exit 0
            fi
            echo "  Attempt $i/30: status=$STATUS"
            sleep 3
          done

          echo "Health check failed after 90s"
          docker compose ps
          docker compose logs --tail=50
          exit 1
          DEPLOY_SCRIPT
