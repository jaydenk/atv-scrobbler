apple_tv:
  # Device identifier from `atvremote scan` (use the Identifier field).
  # Leave blank to auto-discover the first Apple TV on the network.
  # Pairing credentials must exist in .pyatv.conf — see README for setup.
  identifier: ""

trakt:
  # Register an API app at https://trakt.tv/oauth/applications
  # Redirect URI should be: urn:ietf:wg:oauth:2.0:oob
  client_id: ""
  client_secret: ""

scrobble:
  # Minimum content duration (seconds) to scrobble — filters out menus and trailers
  min_duration: 120
  # Seconds to wait before treating idle/stopped as a real stop.
  # Netflix drops to idle between episodes briefly, so this avoids false stops.
  debounce_seconds: 30
  # Apps to ignore (bundle identifiers)
  ignored_apps:
    - "com.apple.Fitness"
    - "com.apple.TVHomeScreen"
  # Media types to scrobble (video, tv, music)
  media_types:
    - video
    - tv

logging:
  # Path to the JSONL event log file (relative to /app in container)
  file: "data/scrobble.jsonl"
  # Log level: trace, debug, info, warning, error
  # "debug" shows app-level debug messages while suppressing noisy libraries.
  # "trace" is the full firehose — includes raw pyatv protocol frames and
  # httpcore connection lifecycle events. Only useful for diagnosing protocol issues.
  level: "info"
