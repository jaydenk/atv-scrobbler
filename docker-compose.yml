services:
  atv-scrobbler:
    build: .
    restart: unless-stopped
    # host networking required for Bonjour/mDNS discovery and MRP ephemeral ports
    network_mode: host
    volumes:
      - ./config.yaml:/app/config.yaml:ro
      - ./trakt_tokens.json:/app/trakt_tokens.json
      - ./scrobble.jsonl:/app/scrobble.jsonl
    environment:
      - TZ=Pacific/Auckland
